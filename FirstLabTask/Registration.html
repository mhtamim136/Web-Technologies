<!DOCTYPE html>
<html lang="en">
<head>
  <title>Register - TechFlow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      height: 100vh;
    }

    /* LEFT PANEL */
    .left-panel {
      width: 200px;
      background-color: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 30px;
    }

    .brand {
      color: white;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .nav-btn {
      display: block;
      width: 150px;
      padding: 10px;
      margin: 6px 0;
      text-align: center;
      text-decoration: none;
      font-size: 15px;
      font-weight: bold;
      color: white;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .nav-btn.active {
      background-color: #28a745;
      color: white;
    }

    /* RIGHT PANEL */
    .right-panel {
      flex: 1;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* FORM BOX */
    .form-box {
      background: white;
      padding: 40px 35px;
      width: 350px;
    }

    .form-box h2 {
 
      margin-bottom: 25px;
      font-size: 22px;
    }

    .form-box label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .form-box input,
    .form-box select {
      width: 100%;
      padding: 10px;
      margin-bottom: 18px;
      border: 1px solid #aaa;
      font-size: 14px;
    }

    .form-box button {
      width: 100%;
      padding: 11px;
      background-color: #28a745;
      color: white;
      font-size: 15px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="brand">TechFlow</div>
    <a href="LoginPage.html" class="nav-btn">Login</a>
    <a href="Registration.html" class="nav-btn active">Registration</a>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="form-box">
      <h2>Create Account</h2>

      <label>Email Address</label>
      <input type="email" />

      <label>Password</label>
      <input type="password" />

      <label>Gender</label>
      <select>
        <option value="">Select</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>

      <button>Register</button>
    </div>
  </div>

</body>
</html>
